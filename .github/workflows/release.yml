name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BIN: fbsy

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (static musl — runs on Debian, Arch, Fedora, Alpine, etc.) ──
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: fbsy-linux-x86_64
            ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: fbsy-linux-aarch64
            ext: ""

          # ── Windows ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fbsy-windows-x86_64
            ext: ".exe"

          # ── macOS Intel ──
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: fbsy-macos-intel
            ext: ""

          # ── macOS Apple Silicon (M1/M2/M3) ──
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: fbsy-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # musl cross-compilation needs musl-tools + cross-linker on Ubuntu
      - name: Install musl tools (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools
          # aarch64 cross-linker
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - name: cargo test (native targets only)
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'x86_64-pc-windows-msvc' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: cargo test --all

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${BIN}${{ matrix.ext }}"
          dst="${{ matrix.artifact }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          find . -type f | sort | xargs sha256sum > ../checksums.txt
          cat ../checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*
            checksums.txt
