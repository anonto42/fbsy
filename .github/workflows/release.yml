name: Release (manual)

# Manual re-release trigger — normally releases are created automatically by ci.yml.
# Use this only to rebuild and re-publish an existing version tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: fbsy-linux-x86_64
            ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: fbsy-linux-aarch64
            ext: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fbsy-windows-x86_64
            ext: ".exe"

          # cross-compiled from Apple Silicon runner — more available than macos-13
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: fbsy-macos-intel
            ext: ""

          - os: macos-14
            target: aarch64-apple-darwin
            artifact: fbsy-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install musl tools (Linux only)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      - name: Setup cross-toolchain (Linux aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/fbsy${{ matrix.ext }}"
          dst="${{ matrix.artifact }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          find . -type f | sort | while read f; do
            sha256sum "$f" | sed 's|  \./|  |'
          done > ../checksums.txt
          cat ../checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          generate_release_notes: true
          files: |
            dist/*/*
            checksums.txt
