name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Always: fmt + clippy + test ─────────────────────────────────────────
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all

  # ── 1.5. Always: dependency security audit ──────────────────────────────────
  audit:
    name: cargo audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  # ── 1.6. Always: secret scan ────────────────────────────────────────────────
  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits on the PR

      - name: Run gitleaks
        uses: gacts/gitleaks@v1

  # ── 1.7. Always: test coverage (non-blocking signal) ────────────────────────
  coverage:
    name: test coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust stable + llvm-tools
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: cargo llvm-cov --all --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24  # v5.4.3
        with:
          files: lcov.info
          fail_ci_if_error: false   # non-blocking: coverage is a signal, not a gate
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. Push to main only: decide whether a new release is needed ────────────
  version-check:
    name: Check if version is new
    needs: [check, audit, secret-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      tag: ${{ steps.check.outputs.tag }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Detect version and check for existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Detected version: $TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG does not exist — will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ── 3. Build binaries for all platforms (only when releasing) ───────────────
  build:
    name: Build ${{ matrix.artifact }}
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — static musl binary works on Debian, Arch, Fedora, Alpine
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: fbsy-linux-x86_64
            ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: fbsy-linux-aarch64
            ext: ""

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fbsy-windows-x86_64
            ext: ".exe"

          # macOS Intel (cross-compiled from Apple Silicon runner — more available than macos-13)
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: fbsy-macos-intel
            ext: ""

          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: fbsy-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust stable + target
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install musl tools (Linux only)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      - name: Setup cross-toolchain (Linux aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/fbsy${{ matrix.ext }}"
          dst="${{ matrix.artifact }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}
          if-no-files-found: error

  # ── 4. Create GitHub Release with binaries, checksums, signatures, SBOM ─────
  release:
    name: Publish GitHub Release
    needs: [version-check, build]
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write  # required for cosign keyless OIDC signing

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: dist/

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          find . -type f | sort | while read -r f; do
            sha256sum "$f" | awk -v b="$(basename "$f")" '{print $1"  "b}'
          done > ../checksums.txt
          cat ../checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb  # v3.8.2

      - name: Sign all release artifacts (keyless via GitHub OIDC)
        run: |
          # Sign each binary and the checksums manifest.
          # Produces a .bundle file per artifact containing the signature,
          # certificate, and Rekor transparency-log entry.
          # Verify offline with: cosign verify-blob --bundle <file>.bundle <file>
          find dist -type f | sort | while read -r f; do
            cosign sign-blob --yes --bundle "${f}.bundle" "$f"
          done
          cosign sign-blob --yes --bundle checksums.txt.bundle checksums.txt

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532  # v0.20.0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          tag_name: ${{ needs.version-check.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*/*
            checksums.txt
            checksums.txt.bundle
            sbom.cyclonedx.json
